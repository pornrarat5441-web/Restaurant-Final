<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kitchen Dashboard</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Top Bar -->
  <div class="topbar">

    <div class="top-left">

  🍽

  <span class="green-dot"></span>

  <span id="prepare-count">0</span>

  <button class="history-btn" onclick="window.location.href='history.html'">
    📜 History
  </button>

</div>

    <div class="top-right">

      <div class="top-item">
        ⏱
        <span id="preparing-count">0</span>
      </div>

      <div class="top-item">
        🍳
        <span id="done-count">0</span>
      </div>

      <div class="top-item">
        🍜
        <span id="sendout-count">0</span>
      </div>

      <div class="clock">
        🕒
        <span id="clock-time">16:00</span>
      </div>

    </div>

  </div>

  <!-- Header -->
  <div class="table-header">

    <div>TABLE</div>
    <div>ORDER</div>
    <div>TIME</div>
    <div>MENUS</div>
    <div>STATUS</div>

  </div>

  <!-- Orders -->
  <div id="orders-container"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>

</body>
</html>
